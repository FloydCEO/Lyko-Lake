<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--void:#07080f;--deep:#0d0f1e;--surface:#121428;--border:#1e2240;--accent:#e94560;--gold:#f5a623;--cyan:#00e5ff;--lyko:#00e676;--text:#dce8ff;--dim:#5a6a90;}
html,body{width:100%;min-height:100%;background:var(--void);color:var(--text);font-family:'DM Mono',monospace;overflow-x:hidden;cursor:none;}
#cursor{position:fixed;top:0;left:0;width:12px;height:12px;background:var(--lyko);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .15s,height .15s;mix-blend-mode:difference;}
#cursor.big{width:36px;height:36px;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,230,118,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,230,118,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
#shell{display:flex;min-height:100vh;position:relative;z-index:2;}
#sidebar{width:220px;min-height:100vh;background:var(--deep);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;z-index:10;overflow-y:auto;}
.sidebar-logo{padding:28px 24px 20px;border-bottom:1px solid var(--border);}
.sidebar-logo a{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:var(--lyko);text-decoration:none;letter-spacing:2px;display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;background:var(--lyko);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-weight:900;font-size:16px;color:#000;}
.sidebar-section{padding:16px 0;border-bottom:1px solid var(--border);}
.sidebar-label{font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;padding:0 20px 10px;}
.sidebar-item{display:flex;align-items:center;gap:12px;padding:10px 20px;color:var(--dim);text-decoration:none;font-size:12px;letter-spacing:1px;transition:color .2s,background .2s;cursor:none;}
.sidebar-item:hover,.sidebar-item.active{color:var(--text);background:rgba(0,230,118,.05);}
.sidebar-item.active{color:var(--lyko);border-left:2px solid var(--lyko);}
.sidebar-icon{font-size:16px;width:20px;text-align:center;}
.sidebar-wallet{margin-top:auto;padding:20px;border-top:1px solid var(--border);}
.wallet-label{font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:12px;}
.wallet-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:4px;cursor:none;transition:border-color .2s;margin-bottom:6px;}
.wallet-row:hover{border-color:var(--lyko);}
.wallet-row.active-currency{border-color:var(--lyko);background:rgba(0,230,118,.06);}
.wallet-coin{display:flex;align-items:center;gap:8px;font-size:11px;}
.coin-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:10px;}
.coin-lyko{background:var(--lyko);color:#000;}
.coin-gold{background:var(--gold);color:#000;}
.coin-cyber{background:var(--cyan);color:#000;}
.wallet-amount{font-size:11px;color:var(--text);font-weight:700;}
#main{flex:1;display:flex;flex-direction:column;}
#topbar{height:64px;background:var(--deep);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:9;}
.topbar-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--dim);letter-spacing:3px;}
.topbar-right{display:flex;align-items:center;gap:16px;}
.active-bal{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;padding:8px 16px;background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.3);border-radius:4px;color:var(--lyko);}
.back-btn{font-size:10px;letter-spacing:2px;color:var(--dim);text-decoration:none;padding:8px 16px;border:1px solid var(--border);border-radius:4px;transition:all .2s;cursor:none;}
.back-btn:hover{color:var(--text);border-color:var(--dim);}
#game-area{display:flex;flex:1;}
#bet-panel{width:260px;background:var(--deep);border-right:1px solid var(--border);padding:24px;flex-shrink:0;display:flex;flex-direction:column;gap:14px;}
#play-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:24px;}
.panel-title{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:var(--dim);letter-spacing:3px;text-transform:uppercase;}
.input-group{display:flex;flex-direction:column;gap:6px;}
.input-label{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
.input-row{display:flex;gap:6px;align-items:center;}
.bet-input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:10px 12px;outline:none;transition:border-color .2s;}
.bet-input:focus{border-color:var(--lyko);}
.half-btn,.double-btn{padding:8px 10px;background:var(--surface);border:1px solid var(--border);color:var(--dim);font-family:'DM Mono',monospace;font-size:10px;cursor:none;transition:all .2s;}
.half-btn:hover,.double-btn:hover{border-color:var(--lyko);color:var(--lyko);}
.play-btn{width:100%;padding:14px;background:var(--lyko);border:none;color:#000;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;cursor:none;transition:all .2s;}
.play-btn:hover{background:#00ff85;box-shadow:0 0 20px rgba(0,230,118,.4);}
.play-btn:disabled{background:var(--dim);}
.cashout-btn{width:100%;padding:14px;background:var(--accent);border:none;color:#fff;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;cursor:none;transition:all .2s;display:none;}
.cashout-btn:hover{background:#ff6070;box-shadow:0 0 20px rgba(233,69,96,.4);}
.cashout-btn.show{display:block;}
.stat-row{display:flex;justify-content:space-between;font-size:11px;padding:8px 0;border-bottom:1px solid var(--border);}
.stat-label{color:var(--dim);}
.stat-val{color:var(--text);font-weight:700;}
.stat-val.green{color:var(--lyko);}
.stat-val.red{color:var(--accent);}
select.bet-input{appearance:none;}

/* CHICKEN ROAD */
#road{display:flex;gap:8px;align-items:flex-end;overflow-x:auto;padding-bottom:8px;max-width:100%;}
.road-step{display:flex;flex-direction:column;align-items:center;gap:4px;}
.stone{
  width:70px;height:70px;
  background:var(--surface);border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-family:'Orbitron',sans-serif;font-weight:700;
  position:relative;flex-shrink:0;transition:all .3s;
}
.stone.safe{border-color:var(--lyko);background:rgba(0,230,118,.1);}
.stone.danger{border-color:var(--accent);background:rgba(233,69,96,.12);}
.stone.current{border-color:var(--lyko);box-shadow:0 0 20px rgba(0,230,118,.3);}
.stone.next-target{border-color:rgba(0,230,118,.4);animation:glowPulse 1s infinite;}
@keyframes glowPulse{0%,100%{box-shadow:0 0 8px rgba(0,230,118,.2)}50%{box-shadow:0 0 20px rgba(0,230,118,.5)}}
.stone-mult{font-size:10px;color:var(--dim);}
.stone-mult.active{color:var(--lyko);}
.chicken-emoji{font-size:36px;position:absolute;top:-24px;animation:chickenBob .5s ease infinite alternate;}
@keyframes chickenBob{0%{transform:translateY(0)}100%{transform:translateY(-4px)}}
.road-arrow{font-size:20px;color:var(--dim);flex-shrink:0;padding-bottom:10px;}
.start-stone{background:var(--deep);border-color:var(--dim);color:var(--dim);}
</style>

<script>
/* getBalance provided by shared system */

function setBet(m){const i=document.getElementById('betAmt');i.value=Math.max(0.01,(parseFloat(i.value)||1)*m).toFixed(2);}

const safeProbs={easy:0.70,medium:0.55,hard:0.40};
let gameActive=false,betAmount=0,currentMult=1,stepsCount=0,chickenPos=0,roadData=[];

function getMultStep(difficulty){
  const base={easy:1.3,medium:1.6,hard:2.2};
  return base[difficulty]||1.6;
}

function buildRoad(){
  const road=document.getElementById('road');
  road.innerHTML='';
  // Start
  const startStep=document.createElement('div');
  startStep.className='road-step';
  startStep.innerHTML='<div class="stone start-stone" id="stone-0"><span class="chicken-emoji" id="chicken">🐔</span>🏠</div><div class="stone-mult active" id="mult-0">Start</div>';
  road.appendChild(startStep);
  // Steps
  for(let i=1;i<=10;i++){
    const mult=(Math.pow(getMultStep(document.getElementById('difficulty').value),i)*0.97).toFixed(2);
    roadData.push(parseFloat(mult));
    const arrow=document.createElement('span');arrow.className='road-arrow';arrow.textContent='→';road.appendChild(arrow);
    const step=document.createElement('div');step.className='road-step';
    step.innerHTML=`<div class="stone" id="stone-${i}"></div><div class="stone-mult" id="mult-${i}">${mult}×</div>`;
    road.appendChild(step);
  }
}

function updateRoad(){
  for(let i=0;i<=10;i++){
    const stone=document.getElementById('stone-'+i);
    if(!stone)continue;
    stone.className='stone';
    if(i<chickenPos)stone.classList.add('safe');
    if(i===chickenPos)stone.classList.add('current');
    if(i===chickenPos+1&&gameActive)stone.classList.add('next-target');
  }
  // Move chicken
  const chicken=document.getElementById('chicken');
  const targetStone=document.getElementById('stone-'+chickenPos);
  if(chicken&&targetStone){targetStone.prepend(chicken);}
}

function startGame(){
  const bet=parseFloat(document.getElementById('betAmt').value)||1;
  if(bet>getBalance())return;
  adjustBalance(-bet);betAmount=bet;currentMult=1;stepsCount=0;chickenPos=0;gameActive=true;
  roadData=[];
  buildRoad();updateRoad();
  document.getElementById('startBtn').disabled=true;
  document.getElementById('difficulty').disabled=true;
  document.getElementById('cashoutBtn').classList.add('show');
  document.getElementById('goBtn').style.display='block';
  document.getElementById('stepsDisplay').textContent='0';
  document.getElementById('multDisplay').textContent='1.00×';
  document.getElementById('profitDisplay').textContent='0.00';
  document.getElementById('statusMsg').textContent='Step forward or cash out!';
}

function step(){
  if(!gameActive)return;
  const diff=document.getElementById('difficulty').value;
  const safeProb=safeProbs[diff]||0.55;
  const safe=Math.random()<safeProb;
  const stone=document.getElementById('stone-'+(chickenPos+1));
  if(safe){
    chickenPos++;stepsCount++;
    currentMult=roadData[chickenPos-1]||currentMult;
    const profit=(betAmount*currentMult-betAmount).toFixed(2);
    document.getElementById('stepsDisplay').textContent=stepsCount;
    document.getElementById('multDisplay').textContent=currentMult.toFixed(2)+'×';
    document.getElementById('profitDisplay').textContent=profit;
    document.getElementById('statusMsg').textContent='Safe! Keep going or cash out.';
    if(stone)stone.classList.remove('next-target');
    updateRoad();
    if(chickenPos>=10){cashout();}
  } else {
    // Boom
    if(stone){stone.textContent='💥';stone.className='stone danger';}
    gameActive=false;
    document.getElementById('startBtn').disabled=false;
    document.getElementById('difficulty').disabled=false;
    document.getElementById('cashoutBtn').classList.remove('show');
    document.getElementById('goBtn').style.display='none';
    document.getElementById('statusMsg').textContent='💥 The chicken fell! Better luck next time.';
    // Move chicken to fallen position
    const chicken=document.getElementById('chicken');
    if(chicken&&stone){stone.prepend(chicken);}
  }
}

function cashout(){
  if(!gameActive)return;
  const payout=betAmount*currentMult;
  adjustBalance(payout);
  gameActive=false;
  document.getElementById('startBtn').disabled=false;
  document.getElementById('difficulty').disabled=false;
  document.getElementById('cashoutBtn').classList.remove('show');
  document.getElementById('goBtn').style.display='none';
  document.getElementById('statusMsg').textContent='🐔 Cashed out! Won '+(payout-betAmount).toFixed(2)+' '+getActiveCurrency().toUpperCase();
}

buildRoad();

  const acc=loadAcc();if(!acc)return;

    <div style="overflow-y:auto;flex:1;padding:20px 24px">

      <div id="mp-tx" style="display:none"><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr style="border-bottom:1px solid #1e2240">${['Time','Game','Bet','Mult','Profit'].map(h=>`<th style="padding:7px 10px;text-align:left;color:#5a6a90;font-weight:400;font-size:9px;letter-spacing:2px;text-transform:uppercase">${h}</th>`).join('')}</tr></thead><tbody>${txRows}</tbody></table></div></div>
      <div id="mp-st" style="display:none"><div style="display:flex;flex-direction:column;gap:12px;max-width:380px"><div><div style="font-size:9px;letter-spacing:2px;color:#5a6a90;text-transform:uppercase;margin-bottom:8px">Display Name</div><div style="display:flex;gap:8px"><input id="mni" value="${acc.username}" style="flex:1;background:#121428;border:1px solid #1e2240;color:#dce8ff;font-family:'DM Mono',monospace;font-size:13px;padding:9px 12px;outline:none"><button onclick="mSaveName()" style="padding:9px 16px;background:#00e676;border:none;color:#000;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;cursor:pointer">SAVE</button></div></div><div><div style="font-size:9px;letter-spacing:2px;color:#5a6a90;text-transform:uppercase;margin-bottom:8px">Withdrawal Address</div><div style="display:flex;gap:8px"><input id="mwi" value="${acc.withdrawalAddress||''}" placeholder="Address / username" style="flex:1;background:#121428;border:1px solid #1e2240;color:#dce8ff;font-family:'DM Mono',monospace;font-size:13px;padding:9px 12px;outline:none"><button onclick="mSaveWallet()" style="padding:9px 16px;background:#00e676;border:none;color:#000;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;cursor:pointer">SAVE</button></div></div><div id="mok" style="display:none;color:#00e676;font-size:11px;letter-spacing:2px">✓ Saved!</div></div></div>
      <div id="mp-wd" style="display:none"><div style="max-width:380px;display:flex;flex-direction:column;gap:12px"><div style="padding:12px;background:rgba(0,230,118,.06);border:1px solid rgba(0,230,118,.2);font-size:11px;color:#00e676;line-height:1.7">Min 1 coin per withdrawal. 1 LYKO = $2.00 USD.</div><div><div style="font-size:9px;letter-spacing:2px;color:#5a6a90;text-transform:uppercase;margin-bottom:6px">Currency</div><select id="wc" style="width:100%;background:#121428;border:1px solid #1e2240;color:#dce8ff;font-family:'DM Mono',monospace;font-size:13px;padding:9px 12px;outline:none"><option value="lyko">LYKO (${(acc.balances.lyko||0).toFixed(2)})</option><option value="gold">GOLD (${(acc.balances.gold||0).toFixed(2)})</option><option value="cyber">CYBER (${(acc.balances.cyber||0).toFixed(2)})</option></select></div><div><div style="font-size:9px;letter-spacing:2px;color:#5a6a90;text-transform:uppercase;margin-bottom:6px">Amount</div><input id="wa" type="number" min="1" step="0.01" placeholder="0.00" style="width:100%;background:#121428;border:1px solid #1e2240;color:#dce8ff;font-family:'DM Mono',monospace;font-size:13px;padding:9px 12px;outline:none"></div><div><div style="font-size:9px;letter-spacing:2px;color:#5a6a90;text-transform:uppercase;margin-bottom:6px">Destination</div><input id="wd" value="${acc.withdrawalAddress||''}" placeholder="Wallet address" style="width:100%;background:#121428;border:1px solid #1e2240;color:#dce8ff;font-family:'DM Mono',monospace;font-size:13px;padding:9px 12px;outline:none"></div><button onclick="mDoWithdraw()" style="width:100%;padding:13px;background:#00e676;border:none;color:#000;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer">CONFIRM WITHDRAWAL</button><div id="wmsg" style="display:none;font-size:11px;padding:9px 12px;border:1px solid"></div></div></div>

// Init
window.addEventListener('DOMContentLoaded', async () => {
  let user = Lyko.getUser();
  if (!user || !Lyko.getToken()) {
    Lyko.showAuthModal(u => { Lyko.refreshDisplays(u); _afterAuthInit(); });
    return;
  }
  const fresh = await Lyko.refreshMe();
  if (!fresh) { Lyko.showAuthModal(u => { Lyko.refreshDisplays(u); _afterAuthInit(); }); return; }
  Lyko.refreshDisplays(fresh);
  _afterAuthInit();
  function _afterAuthInit() {
    const acc = Lyko.getUser(); if (!acc) return;
    Lyko.refreshDisplays(acc);
});

<script src="../casino/lyko.js"></script>
<script>
// ── LYKO SHIM ─────────────────────────────────────────────────────────────────
function loadAcc() { return Lyko.getUser(); }
function saveAcc(acc) { /* no-op: Lyko backend is source of truth */ }
function getBalance() { return Lyko.getBalance(); }
function getActiveCurrency() { return Lyko.getActiveCurrency(); }
function setCurrency(c) { Lyko.setCurrency(c); }
function openAccount(e) { if (e) e.preventDefault(); Lyko.openAccount(); }
function refreshDisplays(acc) { Lyko.refreshDisplays(acc || Lyko.getUser()); }

// adjustBalance: optimistically update local display, then sync via API on recordBet
function adjustBalance(delta) {
  const user = Lyko.getUser();
  if (!user) return;
  const cur = Lyko.getActiveCurrency();
  user.balances[cur] = Math.max(0, (user.balances[cur] || 0) + delta);
  localStorage.setItem('lyko_user', JSON.stringify(user));
  Lyko.refreshDisplays(user);
}

// recordBet: called at end of each game round to settle with the backend
async function recordBet(game, bet, currency, payout, mult) {
  try {
    const result = await Lyko.placeBet({ game, bet, payout, profit: payout - bet, currency: currency || Lyko.getActiveCurrency(), multiplier: mult || 0 });
    Lyko.refreshDisplays(result.user);
    // Sync local storage with authoritative server balance
    localStorage.setItem('lyko_user', JSON.stringify(result.user));
  } catch (e) {
    console.error('[Lyko] recordBet failed:', e.message);
    Lyko.refreshMe().then(u => { if (u) Lyko.refreshDisplays(u); });
  }
}
// ─────────────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => Lyko.initCursor());
</script>
