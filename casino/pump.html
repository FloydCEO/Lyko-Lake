<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pump — Lyko's Casino</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--void:#07080f;--deep:#0d0f1e;--surface:#121428;--border:#1e2240;--accent:#e94560;--gold:#f5a623;--cyan:#00e5ff;--lyko:#00e676;--text:#dce8ff;--dim:#5a6a90;}
html,body{width:100%;min-height:100%;background:var(--void);color:var(--text);font-family:'DM Mono',monospace;overflow-x:hidden;cursor:none;}
#cursor{position:fixed;top:0;left:0;width:12px;height:12px;background:var(--lyko);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .15s,height .15s;mix-blend-mode:difference;}
#cursor.big{width:36px;height:36px;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,230,118,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,230,118,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
#shell{display:flex;min-height:100vh;position:relative;z-index:2;}
#sidebar{width:220px;min-height:100vh;background:var(--deep);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;z-index:10;overflow-y:auto;}
.sidebar-logo{padding:28px 24px 20px;border-bottom:1px solid var(--border);}
.sidebar-logo a{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:var(--lyko);text-decoration:none;letter-spacing:2px;display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;background:var(--lyko);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-weight:900;font-size:16px;color:#000;}
.sidebar-section{padding:16px 0;border-bottom:1px solid var(--border);}
.sidebar-label{font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;padding:0 20px 10px;}
.sidebar-item{display:flex;align-items:center;gap:12px;padding:10px 20px;color:var(--dim);text-decoration:none;font-size:12px;letter-spacing:1px;transition:color .2s,background .2s;cursor:none;}
.sidebar-item:hover,.sidebar-item.active{color:var(--text);background:rgba(0,230,118,.05);}
.sidebar-item.active{color:var(--lyko);border-left:2px solid var(--lyko);}
.sidebar-icon{font-size:16px;width:20px;text-align:center;}
.sidebar-wallet{margin-top:auto;padding:20px;border-top:1px solid var(--border);}
.wallet-label{font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:12px;}
.wallet-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:4px;cursor:none;transition:border-color .2s;margin-bottom:6px;}
.wallet-row:hover{border-color:var(--lyko);}
.wallet-row.active-currency{border-color:var(--lyko);background:rgba(0,230,118,.06);}
.wallet-coin{display:flex;align-items:center;gap:8px;font-size:11px;}
.coin-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:10px;}
.coin-lyko{background:var(--lyko);color:#000;}
.coin-gold{background:var(--gold);color:#000;}
.coin-cyber{background:var(--cyan);color:#000;}
.wallet-amount{font-size:11px;color:var(--text);font-weight:700;}
#main{flex:1;display:flex;flex-direction:column;}
#topbar{height:64px;background:var(--deep);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:9;}
.topbar-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--dim);letter-spacing:3px;}
.topbar-right{display:flex;align-items:center;gap:16px;}
.active-bal{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;padding:8px 16px;background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.3);border-radius:4px;color:var(--lyko);}
.back-btn{font-size:10px;letter-spacing:2px;color:var(--dim);text-decoration:none;padding:8px 16px;border:1px solid var(--border);border-radius:4px;transition:all .2s;cursor:none;}
.back-btn:hover{color:var(--text);border-color:var(--dim);}
#game-area{display:flex;flex:1;}
#bet-panel{width:260px;background:var(--deep);border-right:1px solid var(--border);padding:24px;flex-shrink:0;display:flex;flex-direction:column;gap:14px;}
#play-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:24px;}
.panel-title{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:var(--dim);letter-spacing:3px;text-transform:uppercase;}
.input-group{display:flex;flex-direction:column;gap:6px;}
.input-label{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
.input-row{display:flex;gap:6px;align-items:center;}
.bet-input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:10px 12px;outline:none;transition:border-color .2s;}
.bet-input:focus{border-color:var(--lyko);}
.half-btn,.double-btn{padding:8px 10px;background:var(--surface);border:1px solid var(--border);color:var(--dim);font-family:'DM Mono',monospace;font-size:10px;cursor:none;transition:all .2s;}
.half-btn:hover,.double-btn:hover{border-color:var(--lyko);color:var(--lyko);}
.play-btn{width:100%;padding:14px;background:var(--lyko);border:none;color:#000;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;cursor:none;transition:all .2s;}
.play-btn:hover{background:#00ff85;box-shadow:0 0 20px rgba(0,230,118,.4);}
.play-btn:disabled{background:var(--dim);}
.cashout-btn{width:100%;padding:14px;background:var(--accent);border:none;color:#fff;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;cursor:none;transition:all .2s;display:none;}
.cashout-btn:hover{background:#ff6070;box-shadow:0 0 20px rgba(233,69,96,.4);}
.cashout-btn.show{display:block;}
.stat-row{display:flex;justify-content:space-between;font-size:11px;padding:8px 0;border-bottom:1px solid var(--border);}
.stat-label{color:var(--dim);}
.stat-val{color:var(--text);font-weight:700;}
.stat-val.green{color:var(--lyko);}

/* PUMP BALLOON */
#pumpStage{display:flex;flex-direction:column;align-items:center;gap:24px;position:relative;}
#balloon{
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#ff6b8a,#e94560);
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:#fff;
  transition:transform .1s;
  position:relative;
  box-shadow:0 0 30px rgba(233,69,96,.3);
}
#balloon::after{content:'';position:absolute;bottom:-40px;left:50%;transform:translateX(-50%);width:2px;height:40px;background:var(--dim);}
#balloon.popped{animation:popBurst .5s ease forwards;}
@keyframes popBurst{0%{transform:scale(1)}30%{transform:scale(1.4)}100%{transform:scale(0);opacity:0}}
.mult-big{font-family:'Orbitron',sans-serif;font-size:64px;font-weight:900;transition:color .3s;color:var(--lyko);}
.mult-big.burst{color:var(--accent);}
.history-chips{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:400px;}
.hist-chip{padding:4px 10px;font-size:10px;border:1px solid;border-radius:2px;font-family:'Orbitron',sans-serif;}
.hist-chip.win{border-color:var(--lyko);color:var(--lyko);}
.hist-chip.bust{border-color:var(--accent);color:var(--accent);}
#pumpPipe{font-size:32px;}
</style>
</head>
<body>
<div id="cursor"></div>
<div id="shell">
  <aside id="sidebar">
    <div class="sidebar-logo"><a href="../casino.html"><div class="logo-icon">L</div>LYKO</a></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Originals</div>
      <a class="sidebar-item" href="hilo.html"><span class="sidebar-icon">🃏</span> HiLo</a>
      <a class="sidebar-item" href="limbo.html"><span class="sidebar-icon">🎯</span> Limbo</a>
      <a class="sidebar-item" href="plinko.html"><span class="sidebar-icon">⚪</span> Plinko</a>
      <a class="sidebar-item" href="mines.html"><span class="sidebar-icon">💎</span> Mines</a>
      <a class="sidebar-item" href="chicken.html"><span class="sidebar-icon">🐔</span> Chicken</a>
      <a class="sidebar-item" href="keno.html"><span class="sidebar-icon">🔢</span> Keno</a>
      <a class="sidebar-item active" href="pump.html"><span class="sidebar-icon">🎈</span> Pump</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Navigate</div>
      <a class="sidebar-item" href="../casino.html"><span class="sidebar-icon">🎰</span> Casino Lobby</a>
      <a class="sidebar-item" href="#" onclick="openAccount(event)"><span class="sidebar-icon">👤</span> <span id="usernameNav">Account</span></a>
    </div>
    <div class="sidebar-wallet">
      <div class="wallet-label">Balances</div>
      <div class="wallet-row active-currency" data-currency="lyko" onclick="setCurrency('lyko')">
        <div class="wallet-coin"><div class="coin-icon coin-lyko">L</div><span>LYKO</span></div>
        <span class="wallet-amount" id="bal-lyko">0.00</span>
      </div>
      <div class="wallet-row" data-currency="gold" onclick="setCurrency('gold')">
        <div class="wallet-coin"><div class="coin-icon coin-gold">G</div><span>GOLD</span></div>
        <span class="wallet-amount" id="bal-gold">0.00</span>
      </div>
      <div class="wallet-row" data-currency="cyber" onclick="setCurrency('cyber')">
        <div class="wallet-coin"><div class="coin-icon coin-cyber">C</div><span>CYBER</span></div>
        <span class="wallet-amount" id="bal-cyber">0.00</span>
      </div>
    </div>
  </aside>
  <main id="main">
    <div id="topbar">
      <span class="topbar-title">PUMP</span>
      <div class="topbar-right">
        <div class="active-bal">
          <span id="topCoinIcon" style="width:18px;height:18px;background:var(--lyko);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#000;">L</span>
          <span id="activeCoinBal">0.00</span>
          <span id="activeCoinName" style="font-size:9px;color:var(--dim)">LYKO</span>
        </div>
        <a href="../casino.html" class="back-btn">← LOBBY</a>
      </div>
    </div>
    <div id="game-area">
      <div id="bet-panel">
        <div class="panel-title">Pump</div>
        <div class="input-group">
          <div class="input-label">Bet Amount</div>
          <div class="input-row">
            <input class="bet-input" id="betAmt" type="number" value="1" min="0.01" step="0.01">
            <button class="half-btn" onclick="setBet(0.5)">½</button>
            <button class="double-btn" onclick="setBet(2)">2×</button>
          </div>
        </div>
        <div class="stat-row"><span class="stat-label">Multiplier</span><span class="stat-val green" id="multPanel">1.00×</span></div>
        <div class="stat-row"><span class="stat-label">Net Gain</span><span class="stat-val green" id="gainPanel">0.00</span></div>
        <button class="play-btn" id="playBtn" onclick="startRound()">BET</button>
        <button class="cashout-btn" id="cashoutBtn" onclick="cashout()">CASH OUT 🎈</button>
      </div>
      <div id="play-area">
        <div id="pumpStage">
          <div class="mult-big" id="multBig">1.00×</div>
          <div id="balloon">🎈</div>
          <div id="pumpPipe">🔧</div>
        </div>
        <div class="history-chips" id="histChips"></div>
      </div>
    </div>
  </main>
</div>


<script src="../casino/lyko.js"></script>
<script>

/* getBalance provided by shared system */

function setBet(m){const i=document.getElementById('betAmt');i.value=Math.max(0.01,(parseFloat(i.value)||1)*m).toFixed(2);}

let gameActive=false,betAmount=0,currentMult=1,burstAt=1,animFrame=null,startTime=null;

function generateBurstPoint(){
  // Exponential distribution — avg ~2x, occasional high
  const r=Math.random();
  return Math.max(1.01,0.97/Math.max(r*r,0.001)/2);
function startRound(){
  const bet=parseFloat(document.getElementById('betAmt').value)||1;
  if(bet>getBalance())return;
  adjustBalance(-bet);betAmount=bet;currentMult=1;gameActive=true;
  burstAt=generateBurstPoint();
  document.getElementById('playBtn').disabled=true;
  document.getElementById('cashoutBtn').classList.add('show');
  document.getElementById('balloon').className='';
  document.getElementById('balloon').style.transform='scale(1)';
  document.getElementById('multBig').className='mult-big';
  startTime=Date.now();
  inflate();
function inflate(){
  if(!gameActive)return;
  const elapsed=(Date.now()-startTime)/1000;
  currentMult=1+elapsed*0.4+(elapsed*elapsed*0.05);
  const scale=Math.min(1+elapsed*0.06,3);
  // Color goes from red to orange as it inflates
  const r=Math.min(255,180+elapsed*10);
  const g=Math.max(0,60-elapsed*5);
  document.getElementById('balloon').style.background=`radial-gradient(circle at 35% 35%,rgb(${r},${g},80),rgb(${Math.min(r+20,255)},${g},50))`;
  document.getElementById('balloon').style.transform=`scale(${scale})`;
  document.getElementById('multBig').textContent=currentMult.toFixed(2)+'×';
  document.getElementById('multPanel').textContent=currentMult.toFixed(2)+'×';
  document.getElementById('gainPanel').textContent=(betAmount*currentMult*0.97-betAmount).toFixed(2);
  if(currentMult>=burstAt){burst();return;}
  animFrame=requestAnimationFrame(inflate);
function cashout(){
  if(!gameActive)return;
  cancelAnimationFrame(animFrame);
  gameActive=false;
  const payout=betAmount*currentMult*0.97;
  adjustBalance(payout);
  recordBet('Pump', betAmount, getActiveCurrency(), payout, currentMult);
  document.getElementById('playBtn').disabled=false;
  document.getElementById('cashoutBtn').classList.remove('show');
  addHistory(true,currentMult);
  document.getElementById('balloon').style.transform='scale(1)';
function burst(){
  if(gameActive){ recordBet('Pump', betAmount, getActiveCurrency(), 0, 0); }
  gameActive=false;
  cancelAnimationFrame(animFrame);
  document.getElementById('balloon').className='popped';
  document.getElementById('multBig').className='mult-big burst';
  document.getElementById('multBig').textContent=burstAt.toFixed(2)+'×';
  document.getElementById('playBtn').disabled=false;
  document.getElementById('cashoutBtn').classList.remove('show');
  addHistory(false,burstAt);
  setTimeout(()=>{
    document.getElementById('balloon').className='';
    document.getElementById('balloon').style.transform='scale(1)';
    document.getElementById('multBig').className='mult-big';
    document.getElementById('multBig').textContent='1.00×';
    document.getElementById('multPanel').textContent='1.00×';
  },1500);
function addHistory(win,mult){
  const chips=document.getElementById('histChips');
  const chip=document.createElement('div');
  chip.className='hist-chip '+(win?'win':'bust');
  chip.textContent=mult.toFixed(2)+'×';
  chips.prepend(chip);
  while(chips.children.length>12)chips.removeChild(chips.lastChild);

}
}
}
}
}
}
// ── LYKO SHIM ─────────────────────────────────────────────────────────────────
function loadAcc() { return Lyko.getUser(); }
function saveAcc(acc) { /* no-op */ }
function getBalance() { return Lyko.getBalance(); }
function getActiveCurrency() { return Lyko.getActiveCurrency(); }
function setCurrency(c) { Lyko.setCurrency(c); }
function openAccount(e) { if (e) e.preventDefault(); Lyko.openAccount(); }
function refreshDisplays(acc) { Lyko.refreshDisplays(acc || Lyko.getUser()); }

function adjustBalance(delta) {
  const user = Lyko.getUser();
  if (!user) return;
  const cur = Lyko.getActiveCurrency();
  user.balances[cur] = Math.max(0, (user.balances[cur] || 0) + delta);
  localStorage.setItem('lyko_user', JSON.stringify(user));
  Lyko.refreshDisplays(user);
}

async function recordBet(game, bet, currency, payout, mult) {
  try {
    const result = await Lyko.placeBet({
      game, bet, payout,
      profit: payout - bet,
      currency: currency || Lyko.getActiveCurrency(),
      multiplier: mult || 0
    });
    Lyko.refreshDisplays(result.user);
    localStorage.setItem('lyko_user', JSON.stringify(result.user));
  } catch (e) {
    console.error('[Lyko] recordBet failed:', e.message);
    Lyko.refreshMe().then(u => { if (u) Lyko.refreshDisplays(u); });
  }
}

window.addEventListener('DOMContentLoaded', async () => {
  Lyko.initCursor();
  let user = Lyko.getUser();
  if (!user || !Lyko.getToken()) {
    Lyko.showAuthModal(u => Lyko.refreshDisplays(u));
    return;
  }
  const fresh = await Lyko.refreshMe();
  if (!fresh) { Lyko.showAuthModal(u => Lyko.refreshDisplays(u)); return; }
  Lyko.refreshDisplays(fresh);
});
// ─────────────────────────────────────────────────────────────────────────────
</script>

</body>
</html>
