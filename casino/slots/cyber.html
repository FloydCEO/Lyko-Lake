<script>
// 5×4 grid cascading slots
const COLS = 5, ROWS = 4;
const SYMBOLS = ['⚡','⚡','💠','💠','🔷','🔷','🌀','🌀','⭐','🎯'];
const PAYS = { '⚡':10,'💠':8,'🔷':6,'🌀':5,'⭐':15,'🎯':20 };
let grid = [], spinning = false, sessionWon = 0;

function randSym() { return SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)]; }

function buildGrid() {
  grid = Array.from({length:COLS}, () => Array.from({length:ROWS}, randSym));
}

function renderGrid(highlights=[]) {
  const el = document.getElementById('grid');
  el.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = grid[c][r];
      if (highlights.some(h=>h.c===c&&h.r===r)) {
        cell.classList.add(highlights.find(h=>h.c===c&&h.r===r).jackpot ? 'jackpot' : 'hit');
      }
      el.appendChild(cell);
    }
  }
}

function findMatches() {
  // Find clusters of 3+ same symbol (horizontal or vertical)
  const matched = new Set();
  // Horizontal
  for (let r=0;r<ROWS;r++) {
    let run = 1;
    for (let c=1;c<COLS;c++) {
      if (grid[c][r]===grid[c-1][r]) { run++; }
      else {
        if (run>=3) for(let i=c-run;i<c;i++) matched.add(`${i},${r}`);
        run=1;
      }
    }
    if (run>=3) for(let i=COLS-run;i<COLS;i++) matched.add(`${i},${r}`);
  }
  // Vertical
  for (let c=0;c<COLS;c++) {
    let run=1;
    for (let r=1;r<ROWS;r++) {
      if (grid[c][r]===grid[c][r-1]) { run++; }
      else {
        if (run>=3) for(let i=r-run;i<r;i++) matched.add(`${c},${i}`);
        run=1;
      }
    }
    if (run>=3) for(let i=ROWS-run;i<ROWS;i++) matched.add(`${c},${i}`);
  }
  return [...matched].map(k => { const [c,r]=k.split(',').map(Number); return {c,r,sym:grid[c][r]}; });
}

function calcMatchValue(matches) {
  const counts = {};
  for (const m of matches) counts[m.sym] = (counts[m.sym]||0)+1;
  let mult = 0;
  for (const [sym,cnt] of Object.entries(counts)) {
    mult += (PAYS[sym]||5) * (cnt/3);
  }
  return Math.max(0, parseFloat(mult.toFixed(2)));
}

function cascade(matches) {
  // Remove matched cells and drop new ones
  for (const {c,r} of matches) grid[c][r] = null;
  // Drop down
  for (let c=0;c<COLS;c++) {
    const surviving = grid[c].filter(s=>s!==null);
    const newOnes = Array.from({length:ROWS-surviving.length}, randSym);
    grid[c] = [...newOnes, ...surviving];
  }
}

async function spin() {
  const bet = parseFloat(document.getElementById('betAmt').value)||10;
  if (bet>Lyko.getBalance()) { document.getElementById('resultDisplay').textContent='Insufficient balance!'; document.getElementById('resultDisplay').className='result-display lose'; return; }
  if (spinning) return;
  spinning = true;

  const btn = document.getElementById('spinBtn');
  btn.disabled = true;
  document.getElementById('resultDisplay').textContent = '';
  document.getElementById('multDisplay').textContent = '';
  document.getElementById('cascadeCount').textContent = '0';
  document.getElementById('totalMult').textContent = '1.00×';
  document.getElementById('cascadeBanner').className = 'cascade-banner';

  adjustBalance(-bet);
  buildGrid();
  renderGrid();
  await new Promise(r=>setTimeout(r,400));

  let totalMult = 0, cascades = 0;
  let isJackpot = false;

  while (true) {
    const matches = findMatches();
    if (matches.length === 0) break;

    const matchMult = calcMatchValue(matches);
    const cascadeBonus = Math.pow(1.25, cascades); // each cascade multiplies by 1.25
    const roundMult = parseFloat((matchMult * cascadeBonus).toFixed(2));
    totalMult += roundMult;

    if (totalMult >= 50) isJackpot = true;

    const highlights = matches.map(m => ({...m, jackpot: isJackpot}));
    renderGrid(highlights);

    document.getElementById('totalMult').textContent = totalMult.toFixed(2)+'×';
    document.getElementById('multDisplay').textContent = totalMult.toFixed(2)+'×';

    if (cascades > 0) {
      document.getElementById('cascadeBanner').className = 'cascade-banner show';
      document.getElementById('cascadeBanner').textContent = `⚡ CASCADE ×${cascades+1}!`;
    }

    await new Promise(r=>setTimeout(r,700));
    cascade(matches);
    renderGrid();
    await new Promise(r=>setTimeout(r,300));
    cascades++;
    document.getElementById('cascadeCount').textContent = cascades;
  }

  const payout = totalMult > 0 ? parseFloat((bet * totalMult).toFixed(2)) : 0;
  const profit = payout - bet;

  if (payout > 0) adjustBalance(payout);
  sessionWon += profit;
  document.getElementById('sessionWon').textContent = sessionWon.toFixed(2);
  document.getElementById('lastWin').textContent = payout > 0 ? payout.toFixed(2) : '0.00';

  if (isJackpot) {
    document.getElementById('resultDisplay').textContent = '🎰 JACKPOT! ' + payout.toFixed(2);
    document.getElementById('resultDisplay').className = 'result-display jackpot';
  } else if (totalMult > 0) {
    document.getElementById('resultDisplay').textContent = `WIN! ${totalMult.toFixed(2)}× → ${payout.toFixed(2)}`;
    document.getElementById('resultDisplay').className = 'result-display win';
  } else {
    document.getElementById('resultDisplay').textContent = 'No clusters — spin again!';
    document.getElementById('resultDisplay').className = 'result-display lose';
    document.getElementById('multDisplay').textContent = '';
  }

  try {
    const result = await Lyko.placeBet({ game:'Cyber Slots', bet, payout, profit, currency:Lyko.getActiveCurrency(), multiplier:totalMult });
    Lyko.refreshDisplays(result.user);
  } catch(e) { Lyko.refreshMe().then(u=>{ if(u) Lyko.refreshDisplays(u); }); }

  spinning = false;
  btn.disabled = false;
}

function adjustBet(m) { const i=document.getElementById('betAmt'); i.value=Math.max(0.01,(parseFloat(i.value)||10)*m).toFixed(2); }
function adjustBalance(delta) { const user=Lyko.getUser(); if(!user)return; const cur=Lyko.getActiveCurrency(); user.balances[cur]=Math.max(0,(user.balances[cur]||0)+delta); localStorage.setItem('lyko_user',JSON.stringify(user)); Lyko.refreshDisplays(user); }
function setCurrency(c) { Lyko.setCurrency(c); }
function openAccount(e) { if(e)e.preventDefault(); Lyko.openAccount(); }

buildGrid();
renderGrid();

window.addEventListener('DOMContentLoaded', async () => {
  Lyko.initCursor();
  const cursor=document.getElementById('cursor');
  document.addEventListener('mousemove',e=>{cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px';});
  document.querySelectorAll('a,button,.wallet-row').forEach(el=>{el.addEventListener('mouseenter',()=>cursor.classList.add('big'));el.addEventListener('mouseleave',()=>cursor.classList.remove('big'));});
  let user=Lyko.getUser();
  if(!user||!Lyko.getToken()){Lyko.showAuthModal(u=>Lyko.refreshDisplays(u));return;}
  const fresh=await Lyko.refreshMe();
  if(!fresh){Lyko.showAuthModal(u=>Lyko.refreshDisplays(u));return;}
  Lyko.refreshDisplays(fresh);
});
</script>
</body>
