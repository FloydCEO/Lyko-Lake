<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crash — Lyko's Casino</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--void:#07080f;--deep:#0d0f1e;--surface:#121428;--border:#1e2240;--accent:#e94560;--gold:#f5a623;--cyan:#00e5ff;--lyko:#00e676;--text:#dce8ff;--dim:#5a6a90;}
html,body{width:100%;min-height:100%;background:var(--void);color:var(--text);font-family:'DM Mono',monospace;overflow-x:hidden;cursor:none;}
#cursor{position:fixed;top:0;left:0;width:12px;height:12px;background:var(--lyko);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .15s,height .15s;mix-blend-mode:difference;}
#cursor.big{width:36px;height:36px;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,230,118,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,230,118,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
#shell{display:flex;min-height:100vh;position:relative;z-index:2;}
#sidebar{width:220px;min-height:100vh;background:var(--deep);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;z-index:10;overflow-y:auto;}
.sidebar-logo{padding:28px 24px 20px;border-bottom:1px solid var(--border);}
.sidebar-logo a{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:var(--lyko);text-decoration:none;letter-spacing:2px;display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;background:var(--lyko);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-weight:900;font-size:16px;color:#000;}
.sidebar-section{padding:16px 0;border-bottom:1px solid var(--border);}
.sidebar-label{font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;padding:0 20px 10px;}
.sidebar-item{display:flex;align-items:center;gap:12px;padding:10px 20px;color:var(--dim);text-decoration:none;font-size:12px;letter-spacing:1px;transition:color .2s,background .2s;cursor:none;}
.sidebar-item:hover,.sidebar-item.active{color:var(--text);background:rgba(0,230,118,.05);}
.sidebar-item.active{color:var(--lyko);border-left:2px solid var(--lyko);}
.sidebar-icon{font-size:16px;width:20px;text-align:center;}
.sidebar-wallet{margin-top:auto;padding:20px;border-top:1px solid var(--border);}
.wallet-label{font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:12px;}
.wallet-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:4px;cursor:none;transition:border-color .2s;margin-bottom:6px;}
.wallet-row:hover{border-color:var(--lyko);}
.wallet-row.active-currency{border-color:var(--lyko);background:rgba(0,230,118,.06);}
.wallet-coin{display:flex;align-items:center;gap:8px;font-size:11px;}
.coin-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:10px;}
.coin-lyko{background:var(--lyko);color:#000;}.coin-gold{background:var(--gold);color:#000;}.coin-cyber{background:var(--cyan);color:#000;}
.wallet-amount{font-size:11px;color:var(--text);font-weight:700;}
#main{flex:1;display:flex;flex-direction:column;}
#topbar{height:64px;background:var(--deep);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:9;}
.topbar-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--dim);letter-spacing:3px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.active-bal{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;padding:8px 16px;background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.3);border-radius:4px;color:var(--lyko);}
.back-btn{font-size:10px;letter-spacing:2px;color:var(--dim);text-decoration:none;padding:8px 14px;border:1px solid var(--border);transition:all .2s;cursor:none;}
.back-btn:hover{color:var(--text);border-color:var(--dim);}
#game-area{display:flex;flex:1;}
#bet-panel{width:260px;background:var(--deep);border-right:1px solid var(--border);padding:24px;flex-shrink:0;display:flex;flex-direction:column;gap:14px;overflow-y:auto;}
.panel-title{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:var(--dim);letter-spacing:3px;text-transform:uppercase;}
.input-group{display:flex;flex-direction:column;gap:6px;}
.input-label{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
.input-row{display:flex;gap:6px;align-items:center;}
.bet-input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:10px 12px;outline:none;transition:border-color .2s;}
.bet-input:focus{border-color:var(--lyko);}
.half-btn,.double-btn{padding:8px 10px;background:var(--surface);border:1px solid var(--border);color:var(--dim);font-family:'DM Mono',monospace;font-size:10px;cursor:none;transition:all .2s;}
.half-btn:hover,.double-btn:hover{border-color:var(--lyko);color:var(--lyko);}
.play-btn{width:100%;padding:14px;background:var(--lyko);border:none;color:#000;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;cursor:none;transition:all .2s;margin-top:4px;}
.play-btn:hover{background:#00ff85;box-shadow:0 0 20px rgba(0,230,118,.4);}
.play-btn:disabled{background:var(--dim);cursor:not-allowed;}
.cashout-btn{width:100%;padding:14px;background:var(--accent);border:none;color:#fff;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;cursor:none;transition:all .2s;display:none;}
.cashout-btn:hover{background:#ff6070;box-shadow:0 0 20px rgba(233,69,96,.4);}
.cashout-btn.show{display:block;}
.stat-row{display:flex;justify-content:space-between;font-size:11px;padding:8px 0;border-bottom:1px solid var(--border);}
.stat-label{color:var(--dim);}
.stat-val{color:var(--text);font-weight:700;}
.stat-val.green{color:var(--lyko);}
.stat-val.red{color:var(--accent);}
#play-area{flex:1;display:flex;flex-direction:column;padding:24px;gap:16px;position:relative;}
#crashCanvas{width:100%;flex:1;background:var(--deep);border:1px solid var(--border);min-height:300px;}
.crash-mult-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',sans-serif;font-size:80px;font-weight:900;color:var(--lyko);text-shadow:0 0 40px rgba(0,230,118,.5);pointer-events:none;transition:color .3s,text-shadow .3s;letter-spacing:-2px;}
.crash-mult-overlay.crashed{color:var(--accent);text-shadow:0 0 40px rgba(233,69,96,.5);animation:shake .4s ease;}
.crash-mult-overlay.waiting{color:var(--dim);font-size:24px;letter-spacing:2px;text-shadow:none;}
@keyframes shake{0%,100%{transform:translate(-50%,-50%)}20%{transform:translate(-53%,-50%)}40%{transform:translate(-47%,-50%)}60%{transform:translate(-52%,-50%)}80%{transform:translate(-49%,-50%)}}
.history-strip{display:flex;gap:6px;flex-wrap:wrap;}
.hist-pill{padding:4px 10px;font-size:10px;border:1px solid;border-radius:2px;font-family:'Orbitron',sans-serif;font-weight:700;}
.hist-pill.low{border-color:#e94560;color:#e94560;}
.hist-pill.mid{border-color:#f5a623;color:#f5a623;}
.hist-pill.high{border-color:#00e676;color:#00e676;}
.hist-pill.moon{border-color:#00e5ff;color:#00e5ff;}
.bets-live{display:flex;flex-direction:column;gap:4px;max-height:140px;overflow:hidden;}
.live-bet-row{display:flex;justify-content:space-between;font-size:10px;padding:3px 0;}
.auto-input-row{display:flex;gap:6px;align-items:center;}
.auto-toggle{width:40px;height:22px;background:var(--surface);border:1px solid var(--border);border-radius:11px;cursor:pointer;position:relative;transition:background .2s;}
.auto-toggle.on{background:var(--lyko);}
.auto-toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;}
.auto-toggle.on::after{left:20px;}

.ob-box{background:var(--deep);border:1px solid var(--border);padding:48px;width:min(460px,90vw);text-align:center;animation:fadeUp .6s ease both;}

.ob-input:focus{border-color:var(--lyko);}
.ob-btn{width:100%;padding:16px;background:var(--lyko);border:none;color:#000;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;letter-spacing:3px;cursor:pointer;transition:all .2s;}
.ob-btn:hover{background:#00ff85;box-shadow:0 0 30px rgba(0,230,118,.5);}
.ob-starting{margin-top:16px;font-size:10px;color:var(--dim);letter-spacing:1px;}
.ob-starting b{color:var(--lyko);}
.m-overlay{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);backdrop-filter:blur(4px);}
.m-box{background:#0d0f1e;border:1px solid #1e2240;width:min(740px,95vw);max-height:90vh;display:flex;flex-direction:column;overflow:hidden;}
.m-header{padding:22px 28px;border-bottom:1px solid #1e2240;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.m-tabs{display:flex;border-bottom:1px solid #1e2240;flex-shrink:0;}
.m-tab{flex:1;padding:11px;background:none;border:none;border-bottom:2px solid transparent;color:#5a6a90;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.m-tab.on{border-bottom-color:#00e676;color:#00e676;}
.m-body{overflow-y:auto;flex:1;padding:22px 28px;}
.m-stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px;}
.m-stat{background:#121428;border:1px solid #1e2240;padding:14px;}
.m-stat-label{font-size:9px;letter-spacing:2px;color:#5a6a90;text-transform:uppercase;margin-bottom:6px;}
.m-stat-val{font-family:'Orbitron',sans-serif;font-size:17px;font-weight:700;}
.m-input{width:100%;background:#121428;border:1px solid #1e2240;color:#dce8ff;font-family:'DM Mono',monospace;font-size:13px;padding:10px 12px;outline:none;transition:border-color .2s;}
.m-input:focus{border-color:#00e676;}
.m-btn{padding:10px 18px;background:#00e676;border:none;color:#000;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;}
.m-btn:hover{background:#00ff85;}
.m-btn-full{width:100%;padding:14px;font-size:12px;letter-spacing:2px;}
.m-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:#121428;border:1px solid #1e2240;margin-bottom:8px;}
.m-close{background:none;border:1px solid #1e2240;color:#5a6a90;font-size:18px;padding:6px 12px;cursor:pointer;}
.m-section-label{font-size:9px;letter-spacing:3px;color:#5a6a90;text-transform:uppercase;margin-bottom:10px;}
.tx-table{width:100%;border-collapse:collapse;font-size:11px;}
.tx-table th{padding:7px 10px;text-align:left;color:#5a6a90;font-weight:400;letter-spacing:2px;font-size:9px;text-transform:uppercase;border-bottom:1px solid #1e2240;}
.tx-table td{padding:8px 10px;}
select.m-input{appearance:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<script>
// ─── Cursor ───────────────────────────────────────
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => { cursor.style.left = e.clientX+'px'; cursor.style.top = e.clientY+'px'; });
document.querySelectorAll('a,button,.wallet-row').forEach(el => {
  el.addEventListener('mouseenter', () => cursor.classList.add('big'));
  el.addEventListener('mouseleave', () => cursor.classList.remove('big'));
});

// ─── CRASH GAME ───────────────────────────────────
const canvas = document.getElementById('crashCanvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = W = Math.floor(rect.width);
  canvas.height = H = Math.floor(Math.max(280, rect.height - 80));
}

// State
let phase = 'waiting';
let currentMult = 1;
let crashAt = 1;
let betPlaced = false;
let betAmount = 0;
let hasBet = false;
let autoOn = false;
let autoCashoutVal = 2;
let countdown = 5;
let countdownTimer = null;
let runInterval = null;
let runStart = null;
let chartPoints = [];
let historyArr = [];
let simPlayers = [];

function generateSimPlayers() {
  simPlayers = [];
  for (let i = 0; i < Math.floor(Math.random() * 6) + 3; i++) {
    const names = ['lyko_','neon_','void_','apex_','cyber_','ghost_'];
    simPlayers.push({
      name: names[Math.floor(Math.random() * names.length)] + Math.floor(Math.random() * 999),
      bet: +(Math.random() * 50 + 1).toFixed(2),
      autoCashout: Math.random() < .6 ? +(Math.random() * 8 + 1.2).toFixed(2) : null,
      cashedOut: false, cashedAt: null
    });
  }
  // Add real user to live bets display
  const user = Lyko.getUser();
  if (betPlaced && user) {
    simPlayers.unshift({ name: user.username, bet: betAmount, autoCashout: autoOn ? autoCashoutVal : null, cashedOut: false, cashedAt: null, isPlayer: true });
  }
  renderLiveBets();
}

function renderLiveBets() {
  const el = document.getElementById('liveBets');
  if (!el) return;
  const activePlayers = simPlayers.filter(p => !p.cashedOut);
  const cashedPlayers = simPlayers.filter(p => p.cashedOut);
  el.innerHTML = activePlayers.slice(0, 5).map(p => `
    <div class="live-bet-row">
      <span style="color:${p.isPlayer ? 'var(--lyko)' : 'var(--cyan)'}">${p.name}${p.isPlayer ? ' (you)' : ''}</span>
      <span style="color:var(--dim)">${p.bet.toFixed(2)}</span>
      <span style="color:var(--lyko)">${currentMult.toFixed(2)}×</span>
    </div>`).join('') +
    cashedPlayers.slice(0, 3).map(p => `
    <div class="live-bet-row">
      <span style="color:${p.isPlayer ? 'var(--lyko)' : 'var(--dim)'}; text-decoration:${p.isPlayer ? 'none' : 'line-through'}">${p.name}</span>
      <span style="color:var(--lyko)">✓ ${p.cashedAt?.toFixed(2)}×</span>
    </div>`).join('');
}

function generateCrashPoint() {
  const r = Math.random();
  const crash = 0.99 / Math.max(r * r * r, 0.001);
  return Math.max(1.0, Math.min(crash, 10000));
}

function startCountdown() {
  phase = 'betting';
  countdown = 5;
  betPlaced = false; hasBet = false; betAmount = 0;
  document.getElementById('statusDisplay').textContent = 'Betting...';
  document.getElementById('statusDisplay').style.color = 'var(--gold)';
  document.getElementById('betBtn').disabled = false;
  document.getElementById('betBtn').textContent = 'BET THIS ROUND';
  const overlay = document.getElementById('multOverlay');
  overlay.className = 'crash-mult-overlay waiting';
  overlay.textContent = 'NEXT IN ' + countdown + 's';
  chartPoints = [];
  generateSimPlayers();
  draw();

  countdownTimer = setInterval(() => {
    countdown--;
    overlay.textContent = countdown > 0 ? 'NEXT IN ' + countdown + 's' : 'STARTING...';
    if (countdown <= 0) { clearInterval(countdownTimer); startRound(); }
  }, 1000);
}

function placeBet() {
  const bet = parseFloat(document.getElementById('betAmt').value) || 1;
  const bal = Lyko.getBalance();
  if (bet > bal || bet < 0.01) {
    document.getElementById('betBtn').textContent = 'INSUFFICIENT FUNDS';
    setTimeout(() => document.getElementById('betBtn').textContent = 'BET THIS ROUND', 1500);
    return;
  }
  if (phase === 'running') return;
  betPlaced = true;
  betAmount = bet;
  autoOn = document.getElementById('autoToggle').classList.contains('on');
  autoCashoutVal = parseFloat(document.getElementById('autoCashout').value) || 2;
  document.getElementById('betBtn').textContent = '✓ BET PLACED: ' + bet.toFixed(2);
  document.getElementById('betBtn').disabled = true;
  // Add player to live bets panel
  const user = Lyko.getUser();
  if (user) {
    const existing = simPlayers.find(p => p.isPlayer);
    if (!existing) simPlayers.unshift({ name: user.username, bet: betAmount, autoCashout: autoOn ? autoCashoutVal : null, cashedOut: false, cashedAt: null, isPlayer: true });
  }
  renderLiveBets();
}

function startRound() {
  phase = 'running';
  crashAt = generateCrashPoint();
  currentMult = 1;
  chartPoints = [];
  runStart = Date.now();
  hasBet = betPlaced;
  autoOn = document.getElementById('autoToggle').classList.contains('on');
  autoCashoutVal = parseFloat(document.getElementById('autoCashout').value) || 2;

  if (hasBet) {
    document.getElementById('cashoutBtn').classList.add('show');
    document.getElementById('betBtn').textContent = 'BET NEXT ROUND';
    document.getElementById('betBtn').disabled = true;
  }
  document.getElementById('statusDisplay').textContent = 'IN PROGRESS';
  document.getElementById('statusDisplay').style.color = 'var(--lyko)';
  const overlay = document.getElementById('multOverlay');
  overlay.className = 'crash-mult-overlay';
  overlay.textContent = '1.00×';
  runInterval = requestAnimationFrame(tick);
}

function tick() {
  const elapsed = (Date.now() - runStart) / 1000;
  currentMult = Math.pow(Math.E, 0.06 * elapsed);

  simPlayers.forEach(p => {
    if (!p.cashedOut && p.autoCashout && currentMult >= p.autoCashout) {
      p.cashedOut = true;
      p.cashedAt = currentMult;
    }
  });

  chartPoints.push({ t: elapsed, m: currentMult });
  draw();
  renderLiveBets();

  document.getElementById('multOverlay').textContent = currentMult.toFixed(2) + '×';
  document.getElementById('multDisplay').textContent = currentMult.toFixed(2) + '×';
  if (hasBet) {
    document.getElementById('profitDisplay').textContent = (betAmount * currentMult - betAmount).toFixed(2);
  }

  if (hasBet && autoOn && currentMult >= autoCashoutVal) { cashout(); return; }
  if (currentMult >= crashAt) { crash(); return; }
  runInterval = requestAnimationFrame(tick);
}

async function cashout() {
  if (!hasBet || phase !== 'running') return;
  const payout = betAmount * currentMult;
  const currency = Lyko.getActiveCurrency();
  hasBet = false;
  document.getElementById('cashoutBtn').classList.remove('show');
  document.getElementById('profitDisplay').textContent = '+' + (payout - betAmount).toFixed(2);
  document.getElementById('profitDisplay').style.color = 'var(--lyko)';

  // Mark player as cashed out in live display
  const playerEntry = simPlayers.find(p => p.isPlayer);
  if (playerEntry) { playerEntry.cashedOut = true; playerEntry.cashedAt = currentMult; }
  renderLiveBets();

  try {
    const result = await Lyko.placeBet({
      game: 'Crash', bet: betAmount, payout, profit: payout - betAmount,
      currency, multiplier: currentMult
    });
    Lyko.refreshDisplays(result.user);
  } catch (e) {
    console.error('Bet recording failed:', e.message);
  }
}

async function crash() {
  if (runInterval) cancelAnimationFrame(runInterval);
  phase = 'crashed';
  const finalMult = crashAt;
  const currency = Lyko.getActiveCurrency();

  if (hasBet) {
    hasBet = false;
    // Mark player as busted
    const playerEntry = simPlayers.find(p => p.isPlayer);
    if (playerEntry) { playerEntry.cashedOut = true; playerEntry.cashedAt = null; }
    try {
      const result = await Lyko.placeBet({
        game: 'Crash', bet: betAmount, payout: 0, profit: -betAmount,
        currency, multiplier: 0
      });
      Lyko.refreshDisplays(result.user);
    } catch (e) {
      console.error('Bet recording failed:', e.message);
    }
  }

  document.getElementById('cashoutBtn').classList.remove('show');
  document.getElementById('statusDisplay').textContent = 'CRASHED';
  document.getElementById('statusDisplay').style.color = 'var(--accent)';
  const overlay = document.getElementById('multOverlay');
  overlay.className = 'crash-mult-overlay crashed';
  overlay.textContent = finalMult.toFixed(2) + '×';
  document.getElementById('betBtn').textContent = 'BET NEXT ROUND';
  document.getElementById('betBtn').disabled = false;
  addHistory(finalMult);
  draw(true);
  renderLiveBets();
  setTimeout(startCountdown, 3500);
}

function draw(crashed = false) {
  if (!W || !H) resize();
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0d0f1e';
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = 'rgba(30,34,64,.8)'; ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) { const y = H * (i / 4); ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  for (let i = 0; i <= 6; i++) { const x = W * (i / 6); ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }

  if (chartPoints.length < 2) return;
  const maxT = Math.max(chartPoints[chartPoints.length - 1].t, 5);
  const maxM = Math.max(currentMult, 1.5);

  function toX(t) { return (t / maxT) * W * 0.9 + W * 0.05; }
  function toY(m) { return H - ((Math.log(m) / Math.log(maxM)) * H * 0.85) - H * 0.05; }

  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, crashed ? 'rgba(233,69,96,.2)' : 'rgba(0,230,118,.2)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.moveTo(toX(0), H);
  chartPoints.forEach(p => ctx.lineTo(toX(p.t), toY(p.m)));
  ctx.lineTo(toX(chartPoints[chartPoints.length - 1].t), H);
  ctx.closePath(); ctx.fillStyle = grad; ctx.fill();

  ctx.beginPath(); ctx.moveTo(toX(chartPoints[0].t), toY(chartPoints[0].m));
  chartPoints.forEach(p => ctx.lineTo(toX(p.t), toY(p.m)));
  ctx.strokeStyle = crashed ? '#e94560' : '#00e676'; ctx.lineWidth = 3; ctx.stroke();

  if (chartPoints.length > 0) {
    const last = chartPoints[chartPoints.length - 1];
    ctx.beginPath(); ctx.arc(toX(last.t), toY(last.m), 6, 0, Math.PI * 2);
    ctx.fillStyle = crashed ? '#e94560' : '#00e676';
    ctx.shadowColor = crashed ? '#e94560' : '#00e676'; ctx.shadowBlur = 16; ctx.fill(); ctx.shadowBlur = 0;
  }
}

function addHistory(mult) {
  historyArr.unshift(mult);
  if (historyArr.length > 12) historyArr.pop();
  const strip = document.getElementById('histStrip');
  strip.innerHTML = historyArr.map(m => {
    const cls = m < 2 ? 'low' : m < 5 ? 'mid' : m < 20 ? 'high' : 'moon';
    return `<div class="hist-pill ${cls}">${m.toFixed(2)}×</div>`;
  }).join('');
}

function toggleAuto() {
  const t = document.getElementById('autoToggle');
  t.classList.toggle('on');
  autoOn = t.classList.contains('on');
}

function adjustBet(m) {
  const i = document.getElementById('betAmt');
  i.value = Math.max(0.01, (parseFloat(i.value) || 1) * m).toFixed(2);
}

// ─── Init ─────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  let user = Lyko.getUser();
  const token = Lyko.getToken();

  if (!user || !token) {
    Lyko.showAuthModal(u => {
      Lyko.refreshDisplays(u);
      resize();
      startCountdown();
    });
    return;
  }

  const fresh = await Lyko.refreshMe();
  if (!fresh) {
    Lyko.showAuthModal(u => {
      Lyko.refreshDisplays(u);
      resize();
      startCountdown();
    });
    return;
  }

  Lyko.refreshDisplays(fresh);
  resize();
  startCountdown();
});

window.addEventListener('resize', () => { resize(); draw(); });
</script>
