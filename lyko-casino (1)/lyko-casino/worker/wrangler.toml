name = "lyko-casino"
main = "index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace for user data
[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"          # replace after: wrangler kv:namespace create "LYKO_KV"
preview_id = "YOUR_KV_PREVIEW_ID"

# Durable Object for real-time feed
[[durable_objects.bindings]]
name = "FEED"
class_name = "LiveFeed"

[[migrations]]
tag = "v1"
new_classes = ["LiveFeed"]

# Secrets (set via: wrangler secret put JWT_SECRET)
# JWT_SECRET = "your-secret-here"

[vars]
ENVIRONMENT = "production"
